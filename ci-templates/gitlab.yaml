# GitLab CI — two-path deploy for {@ ENV_NAME @}
#
# Path 1 — pulumi/** changed   → pulumi preview (MR) or pulumi up (push)
# Path 2 — app files changed,  → SSM: git pull + docker-compose up -d
#           pulumi NOT changed
#
# Required CI/CD variables:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   PULUMI_ACCESS_TOKEN, PULUMI_STACK, PULUMI_CONFIG_PASSPHRASE
#   EC2_INSTANCE_ID

stages:
  - infra
  - deploy

variables:
  AWS_DEFAULT_REGION: "{@ AWS_REGION @}"

# ── MR: preview infra changes ─────────────────────────────────────────────────
pulumi-preview:
  stage: infra
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - pulumi/**/*
  before_script:
    - pip install -r pulumi/requirements.txt
  script:
    - cd pulumi && pulumi preview --stack $PULUMI_STACK
  variables:
    AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
    PULUMI_ACCESS_TOKEN: $PULUMI_ACCESS_TOKEN
    PULUMI_CONFIG_PASSPHRASE: $PULUMI_CONFIG_PASSPHRASE

# ── Push: apply infra changes ─────────────────────────────────────────────────
pulumi-apply:
  stage: infra
  image: python:3.11-slim
  rules:
    - if: '$CI_COMMIT_BRANCH == "{@ ENV_NAME @}"'
      changes:
        - pulumi/**/*
  before_script:
    - pip install -r pulumi/requirements.txt
  script:
    - cd pulumi && pulumi up --yes --stack $PULUMI_STACK
  variables:
    AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
    PULUMI_ACCESS_TOKEN: $PULUMI_ACCESS_TOKEN
    PULUMI_CONFIG_PASSPHRASE: $PULUMI_CONFIG_PASSPHRASE

# ── Push: redeploy app (no infra change) ──────────────────────────────────────
deploy-app:
  stage: deploy
  image: python:3.11-slim
  rules:
    - if: '$CI_COMMIT_BRANCH == "{@ ENV_NAME @}"'
      changes:
        - pulumi/**/*
      when: never
    - if: '$CI_COMMIT_BRANCH == "{@ ENV_NAME @}"'
      changes:
        - docker-compose.yml
        - docker-compose.prod.yml
        - blueprint/**/*
        - model/**/*
  before_script:
    - pip install awscli
  script:
    - |
      CMD_ID=$(aws ssm send-command \
        --instance-ids "$EC2_INSTANCE_ID" \
        --document-name "AWS-RunShellScript" \
        --parameters 'commands=["cd /home/ubuntu/cube && git pull && docker-compose -f docker-compose.yml up -d"]' \
        --query "Command.CommandId" --output text)
      echo "SSM Command: $CMD_ID"
      for i in $(seq 1 30); do
        STATUS=$(aws ssm get-command-invocation \
          --command-id "$CMD_ID" --instance-id "$EC2_INSTANCE_ID" \
          --query Status --output text 2>/dev/null || echo Pending)
        echo "  [$i] $STATUS"
        case "$STATUS" in
          Success) break ;;
          Failed|Cancelled|TimedOut) echo "Deploy $STATUS"; exit 1 ;;
        esac
        sleep 10
      done
  variables:
    AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
    AWS_DEFAULT_REGION: "{@ AWS_REGION @}"
