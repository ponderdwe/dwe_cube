# GitLab CI — two-path deploy for branch {@ ENV_NAME @} → workspace {@ WORKSPACE_NAME @}
#
# Path 1 — pulumi/** changed   → pulumi preview (MR) or pulumi up (push)
# Path 2 — app files changed,  → SSM: git pull + docker-compose up (no SSH, no instance ID)
#           pulumi NOT changed
#
# Required CI/CD variables (repository secrets only):
#   AWS_ACCESS_KEY_ID      — AWS credentials for Pulumi + SSM
#   AWS_SECRET_ACCESS_KEY  — AWS credentials for Pulumi + SSM
#   PULUMI_S3_STATE        — S3 backend URL, e.g. s3://my-pulumi-state-bucket
#
# All application secrets live in AWS Secrets Manager: {@ SECRET_NAME @}
# Pulumi reads that secret at deploy time; EC2 pulls it on first boot.

stages:
  - infra
  - deploy

# ── MR: preview infra changes ─────────────────────────────────────────────────
pulumi-preview-{@ ENV_NAME @}:
  stage: infra
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "{@ ENV_NAME @}"'
      changes:
        - pulumi/**/*
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
    - curl -fsSL https://get.pulumi.com | sh
    - pip install -r pulumi/requirements.txt
  script:
    - export PATH="$HOME/.pulumi/bin:$PATH"
    - pulumi login $PULUMI_S3_STATE
    - cd pulumi && (pulumi stack select $WORKSPACE 2>/dev/null || pulumi stack init $WORKSPACE)
    - pulumi preview --stack $WORKSPACE
  variables:
    AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
    AWS_DEFAULT_REGION: "{@ AWS_REGION @}"
    PULUMI_CONFIG_PASSPHRASE: ""
    WORKSPACE: "{@ WORKSPACE_NAME @}"

# ── Push: apply infra changes ─────────────────────────────────────────────────
pulumi-apply-{@ ENV_NAME @}:
  stage: infra
  image: python:3.11-slim
  rules:
    - if: '$CI_COMMIT_BRANCH == "{@ ENV_NAME @}"'
      changes:
        - pulumi/**/*
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl unzip
    - curl -fsSL https://get.pulumi.com | sh
    - pip install -r pulumi/requirements.txt
    - curl -fsSL https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o /tmp/awscliv2.zip
    - unzip -q /tmp/awscliv2.zip -d /tmp && /tmp/aws/install
  script:
    - export PATH="$HOME/.pulumi/bin:$PATH"
    - pulumi login $PULUMI_S3_STATE
    - cd pulumi && (pulumi stack select $WORKSPACE 2>/dev/null || pulumi stack init $WORKSPACE)
    # Bump startup_code_version so every push creates a new launch template version
    # and triggers an ASG instance refresh (via triggers=["launch_template"] in __main__.py).
    - pulumi config set startup_code_version "$CI_COMMIT_SHA" --stack $WORKSPACE
    - pulumi up --yes --stack $WORKSPACE
    - |
      ASG_NAME=$(pulumi stack output asg_name --stack $WORKSPACE)
      echo "Waiting for ASG instance refresh: $ASG_NAME"
      for i in $(seq 1 40); do
        STATUS=$(aws autoscaling describe-instance-refreshes \
          --auto-scaling-group-name "$ASG_NAME" \
          --query "InstanceRefreshes[0].Status" --output text 2>/dev/null || echo "Pending")
        echo "  [$i/40] $STATUS"
        case "$STATUS" in
          Successful) echo "Instance refresh completed."; break ;;
          Failed|Cancelled) echo "Instance refresh $STATUS"; exit 1 ;;
        esac
        [ "$i" -eq 40 ] && { echo "Timeout waiting for instance refresh"; exit 1; }
        sleep 30
      done
  variables:
    AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
    AWS_DEFAULT_REGION: "{@ AWS_REGION @}"
    PULUMI_CONFIG_PASSPHRASE: ""
    WORKSPACE: "{@ WORKSPACE_NAME @}"

# ── Push: redeploy app via SSM (no SSH, no instance ID) ──────────────────────
deploy-app-{@ ENV_NAME @}:
  stage: deploy
  image: python:3.11-slim
  rules:
    - if: '$CI_COMMIT_BRANCH == "{@ ENV_NAME @}"'
      changes:
        - pulumi/**/*
      when: never
    - if: '$CI_COMMIT_BRANCH == "{@ ENV_NAME @}"'
      changes:
        - docker-compose.yml
        - docker-compose.prod.yml
        - blueprint/**/*
        - model/**/*
  before_script:
    - pip install awscli
  script:
    - |
      CMD_ID=$(aws ssm send-command \
        --targets "Key=tag:Environment,Values={@ ENV_NAME @}" \
        --document-name "AWS-RunShellScript" \
        --parameters 'commands=["cd /home/ubuntu/cube && git pull && docker-compose -f docker-compose.yml up -d"]' \
        --query "Command.CommandId" --output text)
      echo "SSM Command: $CMD_ID"
      for i in $(seq 1 30); do
        STATUS=$(aws ssm list-command-invocations \
          --command-id "$CMD_ID" \
          --details \
          --query "CommandInvocations[0].Status" --output text 2>/dev/null || echo Pending)
        echo "  [$i] $STATUS"
        case "$STATUS" in
          Success) break ;;
          Failed|Cancelled|TimedOut) echo "Deploy $STATUS"; exit 1 ;;
        esac
        sleep 10
      done
  variables:
    AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
    AWS_DEFAULT_REGION: "{@ AWS_REGION @}"
