# DWE Cube Adapter — Copier configuration
#
# Controls how `dwe create-service dwe_cube` (or `copier copy`) renders this adapter
# into a client repository.
#
# Rule of thumb:
#   - Value changes per CLIENT  → use {{ variable }} in a .jinja file
#   - Value changes per ENV     → use ${ENV_VAR:-default} in docker-compose / .env
#
# Only files with the .jinja extension are processed by the template engine.
# Everything else is copied verbatim.

# ─────────────────────────────────────────────────────────────────────────────
# DWE-Hub metadata — read by dwe-hub to build the adapter catalog and
# secrets reference UI. Not used by Copier template rendering.
# ─────────────────────────────────────────────────────────────────────────────
_dwe_hub:
  hub_name: cube
  display_name: "Cube.js Semantic Layer"
  icon: "boxes"
  git_providers:
    - github
    - gitlab
  cloud_providers:
    - aws
  services:
    - name: CubeJS
      description: "Semantic layer — REST / GraphQL / WebSocket API over your data warehouse"
    - name: CubeStore
      description: "Pre-aggregation cache for sub-second query responses"
    - name: Milvus
      description: "Vector database for semantic / similarity search"
    - name: RAG FastAPI
      description: "Retrieval-augmented generation API backed by Milvus"
    - name: dbt-cube-sync
      description: "Syncs dbt models to Cube.js schema definitions automatically"
    - name: EC2 DNS
      description: "Route53 A record pointing directly to the EC2 instance IP — private IP for internal ALB, public IP for internet-facing"
  ci_templates:
    github: ci-templates/github.yaml
    gitlab: ci-templates/gitlab.yaml
  # destination: ci           → add as a GitHub / GitLab repository secret
  # destination: secrets_manager → store in AWS Secrets Manager under DWE_DEPLOY_CUBE
  #
  # Pulumi reads ALL runtime config from DWE_DEPLOY_CUBE at deploy time.
  # CI only needs AWS credentials to run Pulumi and manage the autoscaling group via SSM.
  required_secrets:
    # ── CI secrets (GitHub / GitLab repository secrets) ──────────────────────
    # Only AWS credentials are needed in CI.  Pulumi state lives in S3 (no
    # Pulumi SaaS token).  App redeployment uses SSM Run Command targeting
    # instances by environment tag — no SSH, no hard-coded instance IDs.
    - key: AWS_ACCESS_KEY_ID
      description: "AWS access key — Pulumi uses this to provision infrastructure and SSM to redeploy the app"
      destination: ci
    - key: AWS_SECRET_ACCESS_KEY
      description: "AWS secret key"
      destination: ci
    - key: PULUMI_S3_STATE
      description: "S3 URL for Pulumi state backend, e.g. s3://my-pulumi-state-bucket"
      destination: ci

    # ── AWS Secrets Manager: DWE_DEPLOY_CUBE (or DWE_DEPLOY_CUBE_dev) ────────
    - key: ROUTE53_ZONE_ID
      description: "Route53 hosted zone ID (e.g. Z1D633PJN98FT9)"
      destination: secrets_manager
    - key: DNS_NAME
      description: "Public DNS name for the Cube API (e.g. cube.myorg.com)"
      destination: secrets_manager
    - key: ACM_CERTIFICATE_ARN
      description: "ACM certificate ARN for HTTPS on the ALB (must cover DNS_NAME)"
      destination: secrets_manager
    - key: VPC_ID
      description: "AWS VPC ID where the infrastructure is deployed"
      destination: secrets_manager
    - key: ALB_SUBNET_IDS
      description: "JSON array of public subnet IDs for the ALB (e.g. [\"subnet-aaa\",\"subnet-bbb\"])"
      destination: secrets_manager
    - key: KEY_NAME
      description: "EC2 key pair name for SSH access (optional)"
      destination: secrets_manager
    - key: git_deploy_token
      description: "GitHub / GitLab token — EC2 uses this to clone the repo on first boot"
      destination: secrets_manager
    - key: git_deploy_username
      description: "GitHub / GitLab username paired with git_deploy_token for HTTPS clone (e.g. a bot account)"
      destination: secrets_manager
    - key: CUBEJS_DB_TYPE
      description: "Data warehouse driver (postgres | bigquery | snowflake | athena | redshift | trino …)"
      destination: secrets_manager
    - key: CUBEJS_DB_HOST
      description: "Data warehouse hostname"
      destination: secrets_manager
    - key: CUBEJS_DB_PORT
      description: "Data warehouse port (e.g. 5432 for Postgres)"
      destination: secrets_manager
    - key: CUBEJS_DB_NAME
      description: "Data warehouse database / catalog name"
      destination: secrets_manager
    - key: CUBEJS_DB_USER
      description: "Data warehouse username"
      destination: secrets_manager
    - key: CUBEJS_DB_PASS
      description: "Data warehouse password"
      destination: secrets_manager
    - key: CUBEJS_API_SECRET
      description: "JWT signing secret for Cube.js API — generate with: openssl rand -hex 32"
      destination: secrets_manager
    - key: SUPERSET_URL
      description: "Superset instance URL for dbt-cube-sync (e.g. https://superset.myorg.com)"
      destination: secrets_manager
    - key: SUPERSET_USERNAME
      description: "Superset username used by dbt-cube-sync"
      destination: secrets_manager
    - key: SUPERSET_PASSWORD
      description: "Superset password for the sync user"
      destination: secrets_manager
  optional_secrets:
    - key: HOSTED_ZONE_ID_EC2_DNS
      description: "Route53 hosted zone ID for the EC2 DNS record (e.g. Z1MHSQZ1OR039Y). If set, EC2_DNS must also be set."
      destination: secrets_manager
    - key: EC2_DNS
      description: "DNS name for the EC2 instance A record (e.g. cube.internal.myorg.com). Resolves to private IP when ALB is internal, public IP otherwise."
      destination: secrets_manager
    - key: OPENAI_API_KEY
      description: "OpenAI API key for Milvus RAG embeddings"
      destination: secrets_manager
    - key: DATABASE_URI
      description: "SQLAlchemy URI for dbt-cube-sync metadata (defaults to local SQLite)"
      destination: secrets_manager
    - key: AWS_DEFAULT_REGION
      description: "AWS region (defaults to us-east-1)"
      destination: secrets_manager
    - key: LLM_PROVIDER
      description: "LLM provider (openai | anthropic | bedrock | ollama)"
      destination: secrets_manager
    - key: LLM_MODEL_ID
      description: "LLM model ID"
      destination: secrets_manager
    - key: LLM_API_KEY
      description: "API key for the chosen LLM provider"
      destination: secrets_manager

_templates_suffix: .jinja

_exclude:
  - copier.yml          # don't copy Copier's own config into the client repo
  - README.md           # adapter README is not for client repos
  - .git
  - .env                # never copy actual secrets
  - __pycache__
  - "*.pyc"
  - "*.pyo"
  - model               # runtime-generated by dbt-cube-sync; client starts empty

_skip_if_exists:
  - .env.example        # preserve any customisations the client has already made

# ─────────────────────────────────────────────────────────────────────────────
# Questions (answered non-interactively by the dwe CLI via --data flags)
# ─────────────────────────────────────────────────────────────────────────────

project_name:
  type: str
  help: >
    Client project slug used for cloud resource naming (EC2, IAM roles, Route53).
    Use lowercase letters, numbers, and hyphens only.
    Example: acme-cube, my-org-semantic-layer
  validator: "{% if not (project_name | regex_search('^[a-z][a-z0-9-]+$')) %}Must be lowercase letters, numbers, hyphens{% endif %}"

git_repo_url:
  type: str
  default: ""
  when: false   # always set programmatically by dwe CLI

adapter_name:
  type: str
  default: dwe_cube
  when: false   # always set programmatically by dwe CLI

adapter_version:
  type: str
  default: v1.0.0
  when: false   # always set programmatically by dwe CLI

environments:
  type: yaml
  default: "[dev, prod]"
  help: "List of deployment environments (each gets its own Pulumi stack and CI job)"

aws_region:
  type: str
  default: us-east-1
  help: "AWS region where infrastructure is provisioned"

instance_type:
  type: str
  default: t3.xlarge
  help: >
    EC2 instance type. Cube.js + CubeStore + Milvus are memory-intensive.
    Minimum recommended: t3.large. Production: t3.xlarge or r6i.large.

volume_size:
  type: int
  default: 100
  help: "EBS root volume size in GB. Milvus vector index can grow large."

secret_id:
  type: str
  default: "DWE_DEPLOY_CUBE"
  help: >
    AWS Secrets Manager secret name that holds all runtime credentials
    (CUBEJS_DB_*, SUPERSET_*, OPENAI_API_KEY, git_deploy_token, etc.).
    Per-environment stacks append a suffix automatically: DWE_DEPLOY_CUBE_dev, DWE_DEPLOY_CUBE_prod.
