# DWE Cube Adapter — Copier configuration
#
# Controls how `dwe create-service dwe_cube` (or `copier copy`) renders this adapter
# into a client repository.
#
# Rule of thumb:
#   - Value changes per CLIENT  → use {{ variable }} in a .jinja file
#   - Value changes per ENV     → use ${ENV_VAR:-default} in docker-compose / .env
#
# Only files with the .jinja extension are processed by the template engine.
# Everything else is copied verbatim.

# ─────────────────────────────────────────────────────────────────────────────
# DWE-Hub metadata — read by dwe-hub to build the adapter catalog and
# secrets reference UI. Not used by Copier template rendering.
# ─────────────────────────────────────────────────────────────────────────────
_dwe_hub:
  hub_name: cube
  display_name: "Cube.js Semantic Layer"
  icon: "boxes"
  git_providers:
    - github
    - gitlab
  cloud_providers:
    - aws
  services:
    - name: CubeJS
      description: "Semantic layer — REST / GraphQL / WebSocket API over your data warehouse"
    - name: CubeStore
      description: "Pre-aggregation cache for sub-second query responses"
    - name: Milvus
      description: "Vector database for semantic / similarity search"
    - name: RAG FastAPI
      description: "Retrieval-augmented generation API backed by Milvus"
    - name: dbt-cube-sync
      description: "Syncs dbt models to Cube.js schema definitions automatically"
  ci_templates:
    github: ci-templates/github.yaml
    gitlab: ci-templates/gitlab.yaml
  required_secrets:
    - key: git_deploy_token
      description: "GitHub / GitLab token to clone the adapter repo during hydration"
    - key: AWS_ACCESS_KEY_ID
      description: "AWS access key — Pulumi uses this to provision EC2, EIP, Route53"
    - key: AWS_SECRET_ACCESS_KEY
      description: "AWS secret access key"
    - key: CUBEJS_DB_TYPE
      description: "Data warehouse driver (postgres | bigquery | snowflake | athena | redshift | trino …)"
    - key: CUBEJS_DB_HOST
      description: "Data warehouse hostname"
    - key: CUBEJS_DB_PORT
      description: "Data warehouse port (e.g. 5432 for Postgres)"
    - key: CUBEJS_DB_NAME
      description: "Data warehouse database / catalog name"
    - key: CUBEJS_DB_USER
      description: "Data warehouse username"
    - key: CUBEJS_DB_PASS
      description: "Data warehouse password"
    - key: CUBEJS_API_SECRET
      description: "JWT signing secret for Cube.js API — generate with: openssl rand -hex 32"
    - key: SUPERSET_URL
      description: "Superset instance URL for dbt-cube-sync (e.g. https://superset.myorg.com)"
    - key: SUPERSET_USERNAME
      description: "Superset username used by dbt-cube-sync"
    - key: SUPERSET_PASSWORD
      description: "Superset password for the sync user"
  optional_secrets:
    - key: OPENAI_API_KEY
      description: "OpenAI API key for Milvus RAG embeddings"
    - key: DATABASE_URI
      description: "SQLAlchemy URI for dbt-cube-sync metadata (defaults to local SQLite)"
    - key: AWS_DEFAULT_REGION
      description: "AWS region (defaults to us-east-1)"
    - key: LLM_PROVIDER
      description: "LLM provider (openai | anthropic | bedrock | ollama)"
    - key: LLM_MODEL_ID
      description: "LLM model ID"
    - key: LLM_API_KEY
      description: "API key for the chosen LLM provider"

_templates_suffix: .jinja

_exclude:
  - copier.yml          # don't copy Copier's own config into the client repo
  - README.md           # adapter README is not for client repos
  - .git
  - .gitignore
  - .env                # never copy actual secrets
  - __pycache__
  - "*.pyc"
  - "*.pyo"
  - model               # runtime-generated by dbt-cube-sync; client starts empty

_skip_if_exists:
  - .env.example        # preserve any customisations the client has already made

# ─────────────────────────────────────────────────────────────────────────────
# Questions (answered non-interactively by the dwe CLI via --data flags)
# ─────────────────────────────────────────────────────────────────────────────

project_name:
  type: str
  help: >
    Client project slug used for cloud resource naming (EC2, IAM roles, Route53).
    Use lowercase letters, numbers, and hyphens only.
    Example: acme-cube, my-org-semantic-layer
  validator: "{% if not (project_name | regex_search('^[a-z][a-z0-9-]+$')) %}Must be lowercase letters, numbers, hyphens{% endif %}"

adapter_name:
  type: str
  default: dwe_cube
  when: false   # always set programmatically by dwe CLI

adapter_version:
  type: str
  default: v1.0.0
  when: false   # always set programmatically by dwe CLI

environments:
  type: yaml
  default: "[dev, prod]"
  help: "List of deployment environments (each gets its own Pulumi stack and CI job)"

aws_region:
  type: str
  default: us-east-1
  help: "AWS region where infrastructure is provisioned"

instance_type:
  type: str
  default: t3.xlarge
  help: >
    EC2 instance type. Cube.js + CubeStore + Milvus are memory-intensive.
    Minimum recommended: t3.large. Production: t3.xlarge or r6i.large.

volume_size:
  type: int
  default: 100
  help: "EBS root volume size in GB. Milvus vector index can grow large."

dns_name:
  type: str
  default: cube.example.com
  help: "Public DNS name for the Cube.js API (Route53 A record target)"

secret_id:
  type: str
  default: "{{ project_name }}_cube"
  help: >
    AWS Secrets Manager secret name that holds runtime credentials
    (CUBEJS_DB_*, SUPERSET_*, OPENAI_API_KEY, git_deploy_token, etc.)
